<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamexChange</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="logo">
            <img alt="gameXchange logo" height="40" src="./assets/img/logo.PNG" class="logo"/>
            <span>gameXchange</span>
        </div>
        <nav>
            <a href="#">Store</a>
            <a href="#">Sobre</a>
            <a href="#">Suporte</a>
        </nav>
        <a class="login-btn" href="#">Entrar</a>
    </div>
    <div class="search-bar">
        <input placeholder="Pesquisar na loja..." type="text"/>
    </div>
    <div class="main-content">
        <img alt="God of War Ragnarok promotional image" src="./assets/img/GodofWarragnarok.webp"/>
        <div class="sidebar">
            <div class="game">
                <img alt="Minecraft game cover" src="./assets/img/minecraft.jpg"/>
                <span>Minecraft</span>
            </div>
            <div class="game">
                <img alt="Fall Guys game cover" src="./assets/img/FallGuys.png"/>
                <span>Fall Guys</span>
            </div>
            <div class="game">
                <img alt="Fortnite game cover" src="./assets/img/Fortnite.png"/>
                <span>Fortnite</span>
            </div>
            <div class="game">
                <img alt="Days Gone game cover" src="./assets/img/DaysGone.webp"/>
                <span>Days Gone</span>
            </div>
            <div class="game">
                <img alt="Dead Cells game cover" src="./assets/img/DeadCells.png"/>
                <span>Dead Cells</span>
            </div>
            <div class="game">
                <img alt="Forza 7 game cover" src="./assets/img/Forza7.webp"/>
                <span>Forza 7</span>
            </div>
        </div>
    </div>
</body>
</html>
